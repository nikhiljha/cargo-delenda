<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 50% 45%, rgba(110, 22, 22, 0.6) 0%, transparent 65%),
      linear-gradient(180deg, #4A0E10 0%, #5C1214 40%, #4A0E10 100%);
    background-attachment: fixed;
  }
  body {
    width: 1280px;
    height: 640px;
    max-height: 640px;
    overflow: hidden;
    background-color: #4A0E10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .title {
    font-family: Menlo, 'SF Mono', 'Courier New', monospace;
    font-weight: 700;
    font-size: 88px;
    color: #F0EBE3;
    text-align: center;
    letter-spacing: 0.06em;
    line-height: 1.15;
    position: relative;
    z-index: 2;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 28px 0;
    position: relative;
    z-index: 2;
  }
  .divider svg { opacity: 0.45; }
  .divider-line {
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #C9A84C, transparent);
  }

  .subtitle {
    font-family: Didot, 'Bodoni 72', 'Times New Roman', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 24px;
    color: #E8D5A3;
    letter-spacing: 0.12em;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  /* Background logo decorations */
  .bg-logo {
    position: absolute;
    z-index: 1;
    opacity: 1;
  }

  .rust-logo {
    right: 60px;
    top: 60%;
    transform: translateY(-50%);
    width: 260px;
    height: 260px;
  }

  .eagle {
    left: 20px;
    top: 38%;
    transform: translateY(-50%);
    height: 180px;
  }

  .corner {
    position: absolute;
    opacity: 0.18;
    z-index: 2;
  }
  .corner-tl { top: 32px; left: 32px; }
  .corner-tr { top: 32px; right: 32px; transform: scaleX(-1); }
  .corner-bl { bottom: 32px; left: 32px; transform: scaleY(-1); }
  .corner-br { bottom: 32px; right: 32px; transform: scale(-1, -1); }
</style>
</head>
<body>
  <!-- Background decorations -->
  <img class="bg-logo eagle" src="eagle.svg" alt="">
  <img class="bg-logo rust-logo" src="rust-logo-gold.svg" alt="">

  <!-- Corner laurel motifs -->
  <svg class="corner corner-tl" width="80" height="80" viewBox="0 0 80 80">
    <path d="M8,72 Q8,32 40,8" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <path d="M12,60 Q20,40 36,28 Q24,36 16,52 Z" fill="#C9A84C" opacity="0.6"/>
    <path d="M18,48 Q26,32 42,22 Q30,28 22,42 Z" fill="#C9A84C" opacity="0.4"/>
    <path d="M24,38 Q32,26 46,18 Q36,22 28,34 Z" fill="#C9A84C" opacity="0.3"/>
  </svg>
  <svg class="corner corner-tr" width="80" height="80" viewBox="0 0 80 80">
    <path d="M8,72 Q8,32 40,8" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <path d="M12,60 Q20,40 36,28 Q24,36 16,52 Z" fill="#C9A84C" opacity="0.6"/>
    <path d="M18,48 Q26,32 42,22 Q30,28 22,42 Z" fill="#C9A84C" opacity="0.4"/>
    <path d="M24,38 Q32,26 46,18 Q36,22 28,34 Z" fill="#C9A84C" opacity="0.3"/>
  </svg>
  <svg class="corner corner-bl" width="80" height="80" viewBox="0 0 80 80">
    <path d="M8,72 Q8,32 40,8" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <path d="M12,60 Q20,40 36,28 Q24,36 16,52 Z" fill="#C9A84C" opacity="0.6"/>
    <path d="M18,48 Q26,32 42,22 Q30,28 22,42 Z" fill="#C9A84C" opacity="0.4"/>
    <path d="M24,38 Q32,26 46,18 Q36,22 28,34 Z" fill="#C9A84C" opacity="0.3"/>
  </svg>
  <svg class="corner corner-br" width="80" height="80" viewBox="0 0 80 80">
    <path d="M8,72 Q8,32 40,8" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <path d="M12,60 Q20,40 36,28 Q24,36 16,52 Z" fill="#C9A84C" opacity="0.6"/>
    <path d="M18,48 Q26,32 42,22 Q30,28 22,42 Z" fill="#C9A84C" opacity="0.4"/>
    <path d="M24,38 Q32,26 46,18 Q36,22 28,34 Z" fill="#C9A84C" opacity="0.3"/>
  </svg>

  <div class="title">cargo<br>delenda est</div>

  <div class="divider">
    <div class="divider-line"></div>
    <svg width="32" height="20" viewBox="0 0 32 20">
      <path d="M16,18 Q8,14 4,6 Q10,10 16,10 Q22,10 28,6 Q24,14 16,18 Z" fill="#C9A84C"/>
      <path d="M16,14 Q10,10 8,4 Q12,8 16,8 Q20,8 24,4 Q22,10 16,14 Z" fill="#C9A84C" opacity="0.5"/>
    </svg>
    <div class="divider-line"></div>
  </div>

  <div class="subtitle">We must destroy the target folder.</div>
</body>
</html>
